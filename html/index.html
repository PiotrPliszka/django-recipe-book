<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slinotok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-div">
          <!-- Logo-->
          <a href="#" class="logo"><h2 class="name">Slinotok.pl</h2></a>
        </div>
        <div class="logo-div-other">
          <!-- Other elements -->
          <a href="#" class="header-a">Przepisy</a>
          <a href="#" class="header-a">O mnie</a>
        </div>
      </header>
      <main>
        <div class="filter">
          <!-- Filter -->
          <h2>Na co masz ochotę?</h2>
          <div class="filter-options">
            <a href="#" class="filter-btn">Wszystko</a>
            <a href="#" class="filter-btn">Dania główne</a>
            <a href="#" class="filter-btn">Desery</a>
            <a href="#" class="filter-btn">Zupy</a>
            <a href="#" class="filter-btn">Śniadania</a>
          </div>
        </div>
        <div class="food-card-grid">
          <!-- Food Cards -->
          <div class="food-card-div">
            <div class="food-card-img">
              <img src="" alt="" />
            </div>
            <div class="food-card-div-desc">
              <div>
                <p class="food-card-category">Dania główne</p>
              </div>
              <div class="food-card-title">
                <h4>Domowa Pizza Margherita</h4>
              </div>
              <div class="food-card-time-diff">
                <p>🕐 45min</p>
                <p>🧑🏻‍🍳 easy</p>
              </div>
            </div>
          </div>
        </div>
      </main>
      <footer>
        <p>Projek i kod: hinek | Powerd by Djangoo 💖</p>
      </footer>
    </div>
  </body>
</html>
